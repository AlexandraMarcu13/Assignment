<div class="container mt-4">
  <h2>Shopping Cart</h2>
  
  <div *ngIf="cartItems.length === 0" class="alert alert-info">
    Your cart is empty. <a routerLink="/products">Continue shopping</a>
  </div>
  
  <div *ngIf="cartItems.length > 0">
    <table class="table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cartItems">
          <td>{{item.productName}}</td>
          <td>${{item.price}}</td>
          <td>
            <input type="number" 
                   [ngModel]="item.quantity" 
                   (ngModelChange)="updateQuantity(item.productId, $event)"
                   min="1"
                   [max]="getMaxStock(item.productId)"
                   class="quantity-input">
            <small *ngIf="getMaxStock(item.productId) - item.quantity < 3" class="text-danger">
              Only {{getMaxStock(item.productId) - item.quantity}} left in stock
            </small>
          </td>
          <td>${{item.totalPrice | number:'1.2-2'}}</td>
          <td>
            <button class="btn btn-danger btn-sm" (click)="removeItem(item.productId)">
              Remove
            </button>
          </td>
        </tr>
      </tbody>
      <tfoot>
        <tr class="table-total">
          <td colspan="3"><strong>Total:</strong></td>
          <td colspan="2"><strong>${{getTotal() | number:'1.2-2'}}</strong></td>
        </tr>
      </tfoot>
    </table>
    
    <div class="text-end">
      <button class="btn btn-success" (click)="checkout()">Proceed to Checkout</button>
    </div>
  </div>
</div>
